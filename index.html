<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <meta name="description" content="A simple server monitor tool." />
    <meta
      name="keywords"
      content="server monitor, Komari Monitor, server uptime monitoring, real-time server status, server performance dashboard, monitoring tool"
    />
    <meta name="author" content="Akizon77" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const appearance = localStorage.getItem("appearance") || "system";
          const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
          const resolved = appearance === "dark" || (appearance !== "light" && prefersDark) ? "dark" : "light";
          document.documentElement.dataset.initialAppearance = resolved;
          document.documentElement.style.backgroundColor = resolved === "dark" ? "#111111" : "#ffffff";
        } catch {
          document.documentElement.style.backgroundColor = "#ffffff";
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      html[data-initial-appearance="dark"],
      html[data-initial-appearance="dark"] body {
        background: #111111;
      }
    </style>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Komari Monitor" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.ico" />
    
    <meta property="og:title" content="Komari Monitor" />
    <meta property="og:description" content="A simple server monitor tool." />
    <!-- <meta property="og:image" content="/images/komari-preview.png" /> -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Komari Monitor" />
    <meta name="twitter:description" content="A simple server monitor tool." />
    <!-- <meta name="twitter:image" content="/images/komari-preview.png" /> -->
    <title>Komari Monitor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
