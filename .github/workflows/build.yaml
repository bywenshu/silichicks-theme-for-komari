name: Build Theme Release Asset

on:
  release:
    types: [created]

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        
      - name: Package Komari theme
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          ASSET_NAME="silichicks-theme-${TAG_NAME}.zip"
          rm -rf release-package "$ASSET_NAME"
          mkdir -p release-package
          cp preview.png release-package/
          cp komari-theme.json release-package/
          cp LICENSE release-package/
          cp NOTICE release-package/
          cp THIRD_PARTY_NOTICES.md release-package/
          cp -r dist release-package/
          cd release-package
          zip -qr "../${ASSET_NAME}" .
          cd ..
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ env.ASSET_NAME }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/zip
